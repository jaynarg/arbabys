<style>
  :root{
    --paper:#FBF5EA;
    --paper-2:#F3E8D4;
    --paper-edge:#E7D7BC;
    --blush:#F4A6B0;
    --blush-soft:#FBD9DE;
    --sky:#BFE0EC;
    --sky-soft:#E6F2F7;
    --deli-red:#C8102E;
    --deli-red-deep:#900B20;
    --twine:#D8B27E;
    --ink:#463A38;
    --ink-soft:#8C7B76;
    --shadow:rgba(70,58,56,.18);
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 18% 12%, var(--sky-soft) 0%, transparent 42%),
      radial-gradient(circle at 84% 88%, var(--blush-soft) 0%, transparent 45%),
      var(--paper);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 40px;
    -webkit-font-smoothing:antialiased;
  }

  /* dotted nursery wallpaper overlay */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:radial-gradient(var(--paper-edge) 1.4px, transparent 1.4px);
    background-size:26px 26px;
    opacity:.45;
    pointer-events:none;
    z-index:0;
  }

  .stage{position:relative;z-index:1;width:100%;max-width:520px}

  /* ---------- Header ---------- */
  header{text-align:center;margin-bottom:18px}
  .sign{
    display:inline-block;
    background:var(--deli-red);
    color:#FFF6EE;
    font-family:"Baloo 2",cursive;
    font-weight:800;
    letter-spacing:.5px;
    font-size:clamp(26px,7vw,40px);
    line-height:1;
    padding:14px 22px 16px;
    border-radius:16px;
    box-shadow:0 6px 0 var(--deli-red-deep), 0 12px 20px var(--shadow);
    transform:rotate(-1.6deg);
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .sign .small{display:block;font-size:.42em;letter-spacing:2px;font-weight:600;opacity:.92;margin-top:2px}
  .tagline{
    margin:16px auto 0;
    color:var(--ink-soft);
    font-weight:700;
    font-size:15px;
    max-width:340px;
  }

  /* ---------- Deli ticket / selector ---------- */
  .ticket{
    background:var(--paper);
    border:2px dashed var(--paper-edge);
    border-radius:14px;
    padding:14px 16px;
    margin:22px 0 18px;
    display:flex;
    align-items:center;
    gap:10px;
    box-shadow:0 4px 14px var(--shadow);
  }
  .ticket .label{
    font-family:"Courier Prime",monospace;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:1px;
    font-size:11px;
    color:var(--deli-red);
    white-space:nowrap;
  }
  .ticket .selwrap{position:relative;flex:1}
  select{
    appearance:none;-webkit-appearance:none;
    width:100%;
    font-family:"Baloo 2",cursive;
    font-weight:700;
    font-size:18px;
    color:var(--ink);
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:11px;
    padding:9px 38px 9px 14px;
    cursor:pointer;
  }
  .selwrap::after{
    content:"▾";
    position:absolute;right:14px;top:50%;
    transform:translateY(-50%);
    color:var(--deli-red);
    font-size:16px;pointer-events:none;
  }
  .step{
    width:42px;height:42px;flex:0 0 auto;
    border:none;border-radius:11px;
    background:var(--blush);
    color:#fff;
    font-size:20px;font-weight:800;
    cursor:pointer;
    box-shadow:0 3px 0 #d98692;
    transition:transform .08s ease, box-shadow .08s ease;
    line-height:1;
  }
  .step:hover{filter:brightness(1.04)}
  .step:active{transform:translateY(3px);box-shadow:0 0 0 #d98692}
  .step:disabled{opacity:.4;cursor:not-allowed;box-shadow:0 3px 0 #d98692}

  /* ---------- Card ---------- */
  .card{
    position:relative;
    background:
      linear-gradient(135deg, var(--paper) 0%, var(--paper) 60%, var(--paper-2) 100%);
    border-radius:22px;
    padding:26px 24px 30px;
    box-shadow:0 14px 34px var(--shadow), inset 0 0 0 2px var(--paper-edge);
    overflow:hidden;
  }
  /* butcher-paper top tape */
  .card::before{
    content:"";
    position:absolute;top:-10px;left:50%;
    width:120px;height:24px;
    transform:translateX(-50%) rotate(-2deg);
    background:rgba(191,224,236,.6);
    border:1px dashed rgba(70,58,56,.18);
    border-radius:3px;
  }

  .art-frame{
    margin:8px auto 4px;
    width:100%;max-width:300px;
    aspect-ratio:11/9;
    display:flex;align-items:center;justify-content:center;
  }
  .art-frame svg{width:100%;height:100%;overflow:visible}

  .meat-name{
    font-family:"Baloo 2",cursive;
    font-weight:800;
    font-size:clamp(24px,6.4vw,32px);
    line-height:1.05;
    text-align:center;
    color:var(--deli-red);
    margin:6px 0 2px;
  }
  .meat-sub{
    text-align:center;
    font-weight:700;
    color:var(--ink-soft);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:14px;
  }
  .caption{
    text-align:center;
    font-size:15.5px;
    font-weight:600;
    line-height:1.5;
    color:var(--ink);
    max-width:380px;
    margin:0 auto 18px;
  }

  /* scale readout */
  .scale{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
  }
  .chip{
    background:var(--sky-soft);
    border:2px solid var(--sky);
    border-radius:13px;
    padding:9px 16px;
    text-align:center;
    min-width:120px;
  }
  .chip .k{
    font-family:"Courier Prime",monospace;
    font-size:10px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase;
    color:var(--ink-soft);
  }
  .chip .v{
    font-family:"Baloo 2",cursive;
    font-weight:700;font-size:18px;color:var(--ink);
    margin-top:1px;
  }
  .chip .v small{font-size:12px;color:var(--ink-soft);font-family:"Nunito";font-weight:700}

  /* inspection stamp */
  .stamp{
    position:absolute;top:14px;right:10px;
    width:88px;height:88px;
    transform:rotate(11deg);
    opacity:.92;
    pointer-events:none;
  }
  .stamp svg{width:100%;height:100%}

  /* actions + footer */
  .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:20px}
  .copy.alt{background:var(--deli-red);box-shadow:0 4px 0 var(--deli-red-deep)}
  .copy.alt:active{box-shadow:0 0 0 var(--deli-red-deep)}
  .copy{
    border:none;cursor:pointer;
    font-family:"Baloo 2",cursive;font-weight:700;font-size:15px;
    color:#fff;background:var(--ink);
    padding:11px 22px;border-radius:13px;
    box-shadow:0 4px 0 #2e2523;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .copy:active{transform:translateY(3px);box-shadow:0 0 0 #2e2523}
  footer{
    text-align:center;margin-top:24px;
    color:var(--ink-soft);font-size:12px;font-weight:700;line-height:1.6;
  }
  footer .heart{color:var(--deli-red)}

  /* swap animation */
  @keyframes pop{
    0%{transform:scale(.92);opacity:0}
    60%{transform:scale(1.02)}
    100%{transform:scale(1);opacity:1}
  }
  .swapping .art-frame,
  .swapping .meat-name,
  .swapping .caption{animation:pop .32s ease both}

  @media (prefers-reduced-motion: reduce){
    .swapping .art-frame,.swapping .meat-name,.swapping .caption{animation:none}
    .step,.copy{transition:none}
  }
</style>
</head>
<body>
  <div class="stage">
    <header>
      <div class="sign">ARBABY'S<span class="small">We Have the Meat Comparisons!</span></div>
      <p class="tagline">The classic fruit chart, but for people who would rather think about a brisket.</p>
    </header>

    <div class="ticket">
      <span class="label">Now&nbsp;serving<br/>week</span>
      <button class="step" id="prev" aria-label="Previous week">–</button>
      <div class="selwrap">
        <select id="weekSelect" aria-label="Select pregnancy week"></select>
      </div>
      <button class="step" id="next" aria-label="Next week">+</button>
    </div>

    <div class="card" id="card">
      <div class="stamp" id="stamp"></div>
      <div class="art-frame" id="art"></div>
      <h2 class="meat-name" id="meatName">—</h2>
      <div class="meat-sub" id="meatSub">Week —</div>
      <p class="caption" id="caption">—</p>
      <div class="scale">
        <div class="chip"><div class="k">Length</div><div class="v" id="lenV">—</div></div>
        <div class="chip"><div class="k">On the scale</div><div class="v" id="wtV">—</div></div>
      </div>
    </div>

    <div class="actions">
      <button class="copy" id="copyBtn">📋 Copy bragging rights</button>
      <button class="copy alt" id="shotBtn">📸 Save / share image</button>
    </div>

    <footer>
      Made with <span class="heart">♥</span> and a secret blend of dry rub spices by Jay Nargundkar (2026).
    </footer>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ----------------------------------------------------------

---------------------------------------------------------- */
const DATA = {

/* ----------------------------------------------------------
   KAWAII MEAT ILLUSTRATIONS (inline SVG strings)
---------------------------------------------------------- */
const ENV = '<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">';
function face(cx, cy, s){
  s = s || 1;
  const e = 2.4*s, off = 9*s, sm = 5*s, bl = 14*s;
  return `
    <circle cx="${cx-off}" cy="${cy}" r="${e}" fill="#3b2b28"/>
    <circle cx="${cx+off}" cy="${cy}" r="${e}" fill="#3b2b28"/>
    <circle cx="${cx-off+1}" cy="${cy-1}" r="${e*0.35}" fill="#fff"/>
    <circle cx="${cx+off+1}" cy="${cy-1}" r="${e*0.35}" fill="#fff"/>
    <path d="M ${cx-sm} ${cy+5*s} Q ${cx} ${cy+9*s} ${cx+sm} ${cy+5*s}" stroke="#3b2b28" stroke-width="${2*s}" fill="none" stroke-linecap="round"/>
    <ellipse cx="${cx-bl}" cy="${cy+5*s}" rx="${4.6*s}" ry="${3*s}" fill="#f17f8e" opacity="0.55"/>
    <ellipse cx="${cx+bl}" cy="${cy+5*s}" rx="${4.6*s}" ry="${3*s}" fill="#f17f8e" opacity="0.55"/>`;
}
function plate(){
  return `<ellipse cx="110" cy="150" rx="86" ry="15" fill="#e7d7bc" opacity="0.55"/>`;
}

  patty(){return ENV+plate()+`

/* ----------------------------------------------------------
   RENDER
---------------------------------------------------------- */
const sel = document.getElementById('weekSelect');
const card = document.getElementById('card');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const weeks = Object.keys(DATA).map(Number).sort((a,b)=>a-b);
const MINW = weeks[0], MAXW = weeks[weeks.length-1];

weeks.forEach(w=>{
  const o = document.createElement('option');
  o.value = w; o.textContent = `Week ${w}`;
  sel.appendChild(o);
});

function fmtLen(cm){
  const inch = cm/2.54;
  return `${cm} cm <small>(${inch.toFixed(1)} in)</small>`;
}
function fmtWeight(g){
  if(g < 5) return `a whisper <small>(&lt; 5 g)</small>`;
  const totalOz = g/28.3495;
  if(g < 454) return `${Math.round(totalOz)} oz <small>(${g} g)</small>`;
  const lb = Math.floor(g/453.592);
  const oz = Math.round((g - lb*453.592)/28.3495);
  const lbTxt = oz>=16 ? `${lb+1} lb 0 oz` : `${lb} lb ${oz} oz`;
  return `${lbTxt} <small>(${(g/1000).toFixed(2)} kg)</small>`;
}

function render(week){
  const d = DATA[week];
  document.getElementById('art').innerHTML = (ART[d.key]||ART.speck)();
  document.getElementById('meatName').textContent = d.name;
  document.getElementById('meatSub').textContent = `Week ${week}`;
  document.getElementById('caption').textContent = d.cap;
  document.getElementById('lenV').innerHTML = fmtLen(d.cm);
  document.getElementById('wtV').innerHTML = fmtWeight(d.g);
  document.getElementById('stamp').innerHTML = stampSVG(week);

  prevBtn.disabled = (week <= MINW);
  nextBtn.disabled = (week >= MAXW);

  card.classList.remove('swapping');
  void card.offsetWidth; // reflow to restart animation
  card.classList.add('swapping');
}

function setWeek(w){
  w = Math.min(MAXW, Math.max(MINW, w));
  sel.value = w;
  render(w);
}

sel.addEventListener('change', e=> render(Number(e.target.value)));
prevBtn.addEventListener('click', ()=> setWeek(Number(sel.value)-1));
nextBtn.addEventListener('click', ()=> setWeek(Number(sel.value)+1));

/* copy bragging rights */
document.getElementById('copyBtn').addEventListener('click', ()=>{
  const w = Number(sel.value), d = DATA[w];
  const txt = `🥩 Week ${w}: my baby is the size of ${d.name.toLowerCase()}. (Per Arbaby's — the only pregnancy tracker that respects a good brisket. Visit the meat-ernity ward at arbabys.vercel.app)`;
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(txt).then(()=>{
    btn.textContent = '✓ Copied!';
    setTimeout(()=> btn.textContent = '📋 Copy bragging rights', 1600);
  }).catch(()=>{
    btn.textContent = '✓ ' + txt.slice(0,18) + '…';
    setTimeout(()=> btn.textContent = '📋 Copy bragging rights', 1600);
  });
});

/* screenshot the card -> share (mobile) or download (desktop) */
document.getElementById('shotBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('shotBtn');
  const reset = ()=> btn.textContent = '📸 Save / share image';
  if(typeof html2canvas === 'undefined'){
    btn.textContent = 'Image tool offline';
    setTimeout(reset, 1800);
    return;
  }
  const card = document.getElementById('card');
  card.classList.remove('swapping'); // freeze any in-progress animation
  btn.textContent = '📸 Plating…';
  try{
    const canvas = await html2canvas(card, {backgroundColor:'#FBF5EA', scale:2, useCORS:true, logging:false});
    const w = Number(sel.value);
    canvas.toBlob(async (blob)=>{
      if(!blob){ btn.textContent='Hmm, try again'; setTimeout(reset,1800); return; }
      const file = new File([blob], `arbabys-week-${w}.png`, {type:'image/png'});
      // Try native share sheet first (great for texting on iPhone)
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file], title:"Arbaby's", text:`Week ${w} — we have the meat comparisons!`});
          reset();
          return;
        }catch(err){ /* user cancelled or activation expired -> fall through to download */ }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = file.name;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      reset();
    }, 'image/png');
  }catch(e){
    btn.textContent = 'Hmm, try again';
    setTimeout(reset, 1800);
  }
});

/* default */
setWeek(20);
